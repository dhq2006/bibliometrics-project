version: "v0.1"
date: "2026-03-28"
database: "Web of Science Core Collection"
time_window: "2015-01-01 to 2025-12-31"
document_types: ["Article", "Review"]
languages: ["English"]
wos_query: |
  TS=("generative AI" OR "AIGC" OR "generative artificial intelligence" OR "generative model" OR "large language model" OR "LLM" OR "GPT" OR "diffusion model" OR "GAN" OR "generative adversarial network" OR "text to image" OR "text to video" OR "AI generation" OR "generative deep learning" OR "foundation model")
  AND TS=("scientific research" OR "academic research" OR "scientific experiment" OR "research design" OR "data analysis" OR "scientific writing" OR "experimental simulation" OR "scholarly communication" OR "scientific discovery" OR "research innovation")
  AND PY=2015-2025
  AND BT=("Article" OR "Review")
  AND LA=English
